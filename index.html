<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Attendance</title>

<style>

body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Arial;
    text-align:center;
}

.screen{
    display:none;
    padding:20px;
}

.active{
    display:block;
}

h1{
    color:#38bdf8;
    text-shadow:0 0 20px #38bdf8;
}

.box{
    max-width:420px;
    margin:auto;
    margin-top:40px;
    background:#111827;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 25px rgba(0,0,0,0.5);
}

button{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background:#38bdf8;
    color:black;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
}

input{
    width:90%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background:#1e293b;
    color:white;
    font-size:18px;
}

video{
    width:100%;
    border-radius:20px;
    margin-top:20px;
    border:3px solid #38bdf8;
}

.card{
    background:#1e293b;
    margin-top:15px;
    padding:15px;
    border-radius:15px;
}

img{
    width:100%;
    border-radius:15px;
}

#status{
    margin-top:15px;
    color:#4ade80;
    font-size:18px;
}

</style>

</head>

<body>

<!-- HOME -->

<div id="home" class="screen active">

<h1>📸 Smart Attendance</h1>

<div class="box">

<button id="studentBtn">
👨‍🎓 Student
</button>

<button id="teacherBtn">
👨‍🏫 Teacher
</button>

</div>

</div>

<!-- STUDENT -->

<div id="studentScreen" class="screen">

<h1>👨‍🎓 Student Attendance</h1>

<div class="box">

<input id="roll" placeholder="Enter Roll Number">

<video id="video" autoplay playsinline></video>

<button id="captureBtn">
✅ Capture Attendance
</button>

<p id="status"></p>

<button id="backStudent">
⬅ Back
</button>

</div>

</div>

<!-- TEACHER LOGIN -->

<div id="teacherScreen" class="screen">

<h1>🔐 Teacher Login</h1>

<div class="box">

<input id="teacherCode" placeholder="Teacher Code">

<button id="loginBtn">
LOGIN
</button>

<button id="backTeacher">
⬅ Back
</button>

</div>

</div>

<!-- TEACHER PANEL -->

<div id="panelScreen" class="screen">

<h1>📋 Attendance Records</h1>

<div id="records"></div>

<button id="logoutBtn">
⬅ Logout
</button>

</div>

<!-- SUPABASE -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

/* SUPABASE */

const SUPABASE_URL =
"https://xrulbprsxrakvqdnfanj.supabase.co";

const SUPABASE_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhydWxicHJzeHJha3ZxZG5mYW5qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNjMwOTIsImV4cCI6MjA5MzczOTA5Mn0.kMktNM3dZPOnq1yqz5I6tsBY9CG9dbzZLGOdjBzbjP8";

const client =
supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

/* SCREENS */

const home =
document.getElementById("home");

const studentScreen =
document.getElementById("studentScreen");

const teacherScreen =
document.getElementById("teacherScreen");

const panelScreen =
document.getElementById("panelScreen");

/* BUTTONS */

document.getElementById("studentBtn")
.onclick = async function(){

    home.classList.remove("active");

    studentScreen.classList.add("active");

    startCamera();
};

document.getElementById("teacherBtn")
.onclick = function(){

    home.classList.remove("active");

    teacherScreen.classList.add("active");
};

document.getElementById("backStudent")
.onclick = function(){

    location.reload();
};

document.getElementById("backTeacher")
.onclick = function(){

    location.reload();
};

document.getElementById("logoutBtn")
.onclick = function(){

    location.reload();
};

/* CAMERA */

const video =
document.getElementById("video");

async function startCamera(){

    try{

        const stream =
        await navigator.mediaDevices.getUserMedia({
            video:true,
            audio:false
        });

        video.srcObject = stream;

    }catch(err){

        alert("Camera permission denied");
    }
}

/* CAPTURE */

document.getElementById("captureBtn")
.onclick = async function(){

    const roll =
    document.getElementById("roll").value;

    if(!roll){

        alert("Enter Roll Number");
        return;
    }

    const canvas =
    document.createElement("canvas");

    canvas.width =
    video.videoWidth;

    canvas.height =
    video.videoHeight;

    const ctx =
    canvas.getContext("2d");

    ctx.drawImage(
        video,
        0,
        0
    );

    const blob =
    await new Promise(resolve =>
        canvas.toBlob(resolve,"image/png")
    );

    const fileName =
    `${roll}_${Date.now()}.png`;

    /* UPLOAD IMAGE */

    const { error } =
    await client.storage
    .from("attendance-images")
    .upload(fileName, blob);

    if(error){

        alert(error.message);
        return;
    }

    /* IMAGE URL */

    const imageUrl =
`${SUPABASE_URL}/storage/v1/object/public/attendance-images/${fileName}`;

    /* SAVE DATABASE */

    const { error:dbError } =
    await client
    .from("attendance")
    .insert([
        {
            roll:roll,
            time:new Date().toLocaleString(),
            image:imageUrl
        }
    ]);

    if(dbError){

        alert(dbError.message);
        return;
    }

    document.getElementById("status")
    .innerText =
    "✅ Attendance Uploaded!";
};

/* TEACHER LOGIN */

document.getElementById("loginBtn")
.onclick = async function(){

    const code =
    document.getElementById("teacherCode").value;

    if(code !== "teacher123"){

        alert("Wrong Teacher Code");
        return;
    }

    teacherScreen.classList.remove("active");

    panelScreen.classList.add("active");

    loadAttendance();
};

/* LOAD RECORDS */

async function loadAttendance(){

    const records =
    document.getElementById("records");

    records.innerHTML =
    "<h2>Loading...</h2>";

    const { data, error } =
    await client
    .from("attendance")
    .select("*")
    .order("id",{ascending:false});

    if(error){

        records.innerHTML =
        "<h2>Error Loading</h2>";

        return;
    }

    records.innerHTML = "";

    data.forEach(item=>{

        records.innerHTML += `

        <div class="card">

            <h3>
            🎓 Roll: ${item.roll}
            </h3>

            <p>
            ⏰ ${item.time}
            </p>

            <img src="${item.image}">

        </div>

        `;
    });
}

</script>

</body>
</html>
