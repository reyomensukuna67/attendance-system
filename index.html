<!DOCTYPE html>
<html>
<head>
  <title>Smart Attendance</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      background:#0f172a;
      font-family:Arial;
      color:white;
      text-align:center;
      padding:20px;
    }

    h1{
      color:#38bdf8;
      font-size:40px;
      text-shadow:0 0 20px #38bdf8;
    }

    .box{
      max-width:400px;
      margin:auto;
      background:#111827;
      padding:25px;
      border-radius:20px;
      box-shadow:0 0 20px rgba(0,0,0,0.5);
    }

    video{
      width:100%;
      border-radius:20px;
      border:3px solid #38bdf8;
      margin-top:20px;
    }

    input{
      width:90%;
      padding:15px;
      margin-top:20px;
      border:none;
      border-radius:12px;
      font-size:18px;
      background:#1e293b;
      color:white;
    }

    button{
      margin-top:20px;
      width:100%;
      padding:15px;
      border:none;
      border-radius:12px;
      background:#38bdf8;
      color:black;
      font-size:20px;
      cursor:pointer;
      font-weight:bold;
      transition:0.2s;
    }

    button:hover{
      transform:scale(1.03);
    }

    #status{
      margin-top:20px;
      font-size:20px;
      color:#4ade80;
    }
  </style>
</head>

<body>

<h1>📸 Smart Attendance</h1>

<div class="box">

<input id="roll" placeholder="Enter Roll Number">

<video id="video" autoplay playsinline></video>

<button onclick="captureAttendance()">
✅ Capture Attendance
</button>

<p id="status"></p>

</div>

<canvas id="canvas" style="display:none;"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

/* 🔥 PASTE YOUR SUPABASE INFO HERE */
const SUPABASE_URL = "sb_publishable_aG7l7Kq3kEetIHSX4pnqvA_ppQIGr1A";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhydWxicHJzeHJha3ZxZG5mYW5qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNjMwOTIsImV4cCI6MjA5MzczOTA5Mn0.kMktNM3dZPOnq1yqz5I6tsBY9CG9dbzZLGOdjBzbjP8";

const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

/* CAMERA */
const video = document.getElementById("video");

navigator.mediaDevices.getUserMedia({
  video:true
})
.then(stream=>{
  video.srcObject = stream;
})
.catch(err=>{
  alert("Camera access denied");
});

/* CAPTURE */
async function captureAttendance(){

  const roll =
  document.getElementById("roll").value;

  if(!roll){
    alert("Enter Roll Number");
    return;
  }

  const canvas =
  document.getElementById("canvas");

  const ctx = canvas.getContext("2d");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video,0,0);

  const blob = await new Promise(resolve =>
    canvas.toBlob(resolve,"image/png")
  );

  const fileName =
  `${roll}_${Date.now()}.png`;

  /* UPLOAD IMAGE */
  const { error } = await supabase.storage
    .from("attendance-images")
    .upload(fileName, blob);

  if(error){
    alert(error.message);
    return;
  }

  /* IMAGE URL */
  const imageUrl =
`${SUPABASE_URL}/storage/v1/object/public/attendance-images/${fileName}`;

  /* SAVE DATABASE */
  const { error:dbError } = await supabase
    .from("attendance")
    .insert([
      {
        roll:roll,
        time:new Date().toLocaleString(),
        image:imageUrl
      }
    ]);

  if(dbError){
    alert(dbError.message);
    return;
  }

  document.getElementById("status").innerText =
  "✅ Attendance Uploaded!";
}

</script>

</body>
</html>
